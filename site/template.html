<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Title}}</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg:         #080c10;
            --surface:    #0d1117;
            --surface2:   #131920;
            --border:     #1e2d3d;
            --border-hi:  #0f4c75;
            --accent:     #00d4ff;
            --accent2:    #00ff9f;
            --accent3:    #ff6b6b;
            --text:       #a8b8c8;
            --muted:      #4a6070;
            --heading:    #e0f0ff;
            --glow-c:     rgba(0, 212, 255, 0.4);
            --glow-g:     rgba(0, 255, 159, 0.4);
            --font-mono:  "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
            --font-sans:  -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
        }

        html { font-size: 16px; scroll-behavior: smooth; }

        /* ── Dot-grid background ──────────────────────────────────── */
        body {
            background-color: var(--bg);
            background-image: radial-gradient(circle, #1a2a3a 1px, transparent 1px);
            background-size: 28px 28px;
            color: var(--text);
            font-family: var(--font-sans);
            line-height: 1.7;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Scanline overlay */
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0,0,0,0.04) 2px,
                rgba(0,0,0,0.04) 4px
            );
            pointer-events: none;
            z-index: 9999;
        }

        /* ── Animations ───────────────────────────────────────────── */
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50%       { opacity: 0; }
        }

        @keyframes glow-pulse {
            0%, 100% { text-shadow: 0 0 8px var(--glow-g), 0 0 20px var(--glow-g); }
            50%       { text-shadow: 0 0 4px var(--glow-g), 0 0 10px var(--glow-g); }
        }

        @keyframes border-flicker {
            0%, 100% { border-color: var(--border); }
            92%       { border-color: var(--border); }
            93%       { border-color: var(--accent); }
            94%       { border-color: var(--border); }
            96%       { border-color: var(--accent2); }
            97%       { border-color: var(--border); }
        }

        /* ── Header / Nav ─────────────────────────────────────────── */
        header {
            background: rgba(13, 17, 23, 0.92);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(12px);
            animation: border-flicker 8s infinite;
        }

        .header-inner {
            max-width: 960px;
            margin: 0 auto;
            padding: 0 1.5rem;
            height: 58px;
            display: flex;
            align-items: center;
            gap: 2rem;
        }

        .logo {
            font-family: var(--font-mono);
            font-size: 0.9rem;
            color: var(--accent2);
            text-decoration: none;
            white-space: nowrap;
            animation: glow-pulse 3s ease-in-out infinite;
            letter-spacing: 0.05em;
        }

        .logo::before { content: "~/"; color: var(--muted); }

        .logo::after {
            content: "_";
            animation: blink 1s step-end infinite;
            color: var(--accent2);
        }

        nav {
            display: flex;
            gap: 0.15rem;
            flex-wrap: wrap;
            margin-left: auto;
        }

        nav a {
            color: var(--muted);
            text-decoration: none;
            font-family: var(--font-mono);
            font-size: 0.8rem;
            padding: 0.3rem 0.7rem;
            border-radius: 4px;
            border: 1px solid transparent;
            transition: color 0.15s, border-color 0.15s, background 0.15s, text-shadow 0.15s;
            letter-spacing: 0.03em;
        }

        nav a::before { content: "./"; color: var(--border-hi); font-size: 0.7rem; }

        nav a:hover {
            color: var(--accent);
            border-color: var(--border-hi);
            background: rgba(0, 212, 255, 0.06);
            text-shadow: 0 0 8px var(--glow-c);
        }

        /* ── Main content ─────────────────────────────────────────── */
        main {
            max-width: 960px;
            width: 100%;
            margin: 3rem auto;
            padding: 0 1.5rem;
            flex: 1;
        }

        /* ── Typography ───────────────────────────────────────────── */
        main h1 {
            font-size: 2rem;
            color: var(--heading);
            font-weight: 700;
            margin-bottom: 0.75rem;
            padding-bottom: 0.6rem;
            border-bottom: 1px solid var(--border);
            letter-spacing: -0.01em;
            text-shadow: 0 0 30px rgba(0, 212, 255, 0.15);
        }

        main h1::before {
            content: "# ";
            color: var(--accent);
            font-family: var(--font-mono);
            font-size: 1.4rem;
            opacity: 0.6;
        }

        main h2 {
            font-size: 1.35rem;
            color: var(--heading);
            font-weight: 600;
            margin: 2.5rem 0 0.75rem;
        }

        main h2::before {
            content: "## ";
            color: var(--accent2);
            font-family: var(--font-mono);
            font-size: 1rem;
            opacity: 0.5;
        }

        main h3 {
            font-size: 1.05rem;
            color: var(--accent);
            font-family: var(--font-mono);
            font-weight: 600;
            margin: 1.75rem 0 0.5rem;
            letter-spacing: 0.03em;
        }

        main p { margin-bottom: 1rem; }

        main a {
            color: var(--accent);
            text-decoration: none;
            border-bottom: 1px solid rgba(0, 212, 255, 0.25);
            transition: border-color 0.15s, text-shadow 0.15s;
        }

        main a:hover {
            border-bottom-color: var(--accent);
            text-shadow: 0 0 8px var(--glow-c);
        }

        main ul, main ol {
            padding-left: 1.5rem;
            margin-bottom: 1rem;
        }

        main li { margin-bottom: 0.35rem; }

        main li::marker { color: var(--accent2); }

        main code {
            font-family: var(--font-mono);
            font-size: 0.82em;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 3px;
            padding: 0.15em 0.45em;
            color: var(--accent2);
        }

        /* Terminal-style code blocks */
        main pre {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 1.5rem;
            box-shadow: 0 0 0 1px rgba(0, 212, 255, 0.05),
                        0 4px 24px rgba(0, 0, 0, 0.6),
                        inset 0 0 40px rgba(0, 212, 255, 0.02);
        }

        main pre::before {
            content: "  ●  ●  ●";
            display: block;
            background: var(--surface2);
            border-bottom: 1px solid var(--border);
            padding: 0.5rem 1rem;
            font-family: var(--font-mono);
            font-size: 0.75rem;
            color: var(--muted);
            letter-spacing: 0.3em;
        }

        main pre code {
            display: block;
            background: none;
            border: none;
            padding: 1.25rem 1.5rem;
            font-size: 0.875rem;
            color: var(--text);
            overflow-x: auto;
        }

        main blockquote {
            border-left: 2px solid var(--accent);
            padding: 0.75rem 1.25rem;
            margin: 1.5rem 0;
            color: var(--muted);
            background: rgba(0, 212, 255, 0.03);
            border-radius: 0 6px 6px 0;
            font-style: italic;
        }

        main hr {
            border: none;
            border-top: 1px solid var(--border);
            margin: 2.5rem 0;
            position: relative;
        }

        main hr::after {
            content: "◆";
            position: absolute;
            left: 50%;
            top: -0.6em;
            transform: translateX(-50%);
            background: var(--bg);
            padding: 0 0.75rem;
            color: var(--border-hi);
            font-size: 0.6rem;
        }

        main table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 1.5rem;
            font-size: 0.875rem;
            font-family: var(--font-mono);
        }

        main th, main td {
            border: 1px solid var(--border);
            padding: 0.55rem 1rem;
            text-align: left;
        }

        main th {
            background: var(--surface2);
            color: var(--accent);
            font-weight: 600;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            font-size: 0.75rem;
        }

        main tr:hover td { background: rgba(0, 212, 255, 0.03); }

        /* ── ToC ──────────────────────────────────────────────────── */
        .toc {
            background: var(--surface);
            border: 1px solid var(--border);
            border-left: 2px solid var(--accent2);
            border-radius: 6px;
            padding: 1.25rem 1.5rem;
            margin: 2rem 0;
        }

        .toc h2 {
            font-size: 0.75rem;
            font-family: var(--font-mono);
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: var(--accent2);
            margin: 0 0 0.75rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid var(--border);
        }

        .toc h2::before { display: none; }

        .toc ul {
            padding-left: 0;
            list-style: none;
        }

        .toc li::before {
            content: "› ";
            color: var(--accent2);
            font-family: var(--font-mono);
        }

        .toc li::marker { display: none; color: transparent; }

        /* ── Footer ───────────────────────────────────────────────── */
        footer {
            border-top: 1px solid var(--border);
            text-align: center;
            padding: 1.5rem;
            font-size: 0.75rem;
            color: var(--muted);
            font-family: var(--font-mono);
            background: rgba(13, 17, 23, 0.7);
        }

        footer a {
            color: var(--accent2);
            text-decoration: none;
            transition: text-shadow 0.15s;
        }

        footer a:hover {
            text-shadow: 0 0 8px var(--glow-g);
        }

        footer::before {
            content: "[ EOF ] ";
            color: var(--border-hi);
        }

        /* ── Responsive ───────────────────────────────────────────── */
        @media (max-width: 600px) {
            .header-inner { gap: 1rem; height: auto; padding: 0.75rem 1rem; flex-wrap: wrap; }
            main { margin: 1.5rem auto; }
            main h1 { font-size: 1.5rem; }
            nav { margin-left: 0; }
        }
    </style>
</head>
<body>
    <header>
        <div class="header-inner">
            <a class="logo" href="/">chkr.at</a>
            <nav>{{range .Pages}}<a href="{{.URL}}">{{.Title}}</a>{{end}}</nav>
        </div>
    </header>
    <main>
        {{.Content}}
        {{if .TableOfContents}}
        <section class="toc">
            <h2>Table of Contents</h2>
            <ul>
                {{range .TableOfContents}}<li><a href="{{.URL}}">{{.Title}}</a></li>
                {{end}}
            </ul>
        </section>
        {{end}}
    </main>
    <footer>
        built with <a href="https://github.com/ChristianKreuzberger/press">press</a>
    </footer>
</body>
</html>
